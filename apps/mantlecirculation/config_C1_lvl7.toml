## C1 benchmark - level 7
radius-min=1.22
radius-max=2.22
refinement-level-mesh-min=2
refinement-level-mesh-max=7
refinement-level-subdomains=1

## Physics
diffusivity=1
rayleigh-number=1e5
viscosity-law="frank-kamenetskii"
viscosity-rmu=1

## Boundary conditions
velocity-bc-cmb="freeslip"
velocity-bc-surface="freeslip"
temperature-bc-value-cmb=1.0
temperature-bc-value-surface=0.0

## Initial temperature
initial-temperature-profile="conductive"
initial-temperature-sph-degree=3
initial-temperature-sph-order=2
initial-temperature-sph-epsilon=0.01

## Time discretization
pseudo-cfl=0.5
t-end=1.0
max-timesteps=100000
energy-substeps=4

## Stokes solver
stokes-krylov-restart=25
stokes-krylov-max-iterations=25
stokes-krylov-relative-tolerance=1e-06
stokes-krylov-absolute-tolerance=1e-12
stokes-viscous-pc-num-vcycles=1
stokes-viscous-pc-cheby-order=2
stokes-viscous-pc-num-smoothing-steps-prepost=3
stokes-viscous-pc-num-power-iterations=10

## I/O
outdir="./output_C1_lvl7_sdr1"
outdir-overwrite=1
output-frequency=100
