## C1 benchmark - level 7, pseudo-cfl=1.5
radius-min=1.22
radius-max=2.22
refinement-level-mesh-min=2
refinement-level-mesh-max=7
refinement-level-subdomains=1

## Physics
diffusivity=1
rayleigh-number=1e5
viscosity-law="frank-kamenetskii"
viscosity-rmu=1

## Boundary conditions
velocity-bc-cmb="freeslip"
velocity-bc-surface="freeslip"
temperature-bc-value-cmb=1.0
temperature-bc-value-surface=0.0

## Initial temperature - cubic symmetry: T_perturb = Y_4^0 + (5/7) * Y_4^4
initial-temperature-profile="conductive"
initial-temperature-sph-degree=4
initial-temperature-sph-order=0
initial-temperature-sph-epsilon=0.01
initial-temperature-sph-degree-2=4
initial-temperature-sph-order-2=4
initial-temperature-sph-factor-2=0.7142857142857143

## Time discretization
pseudo-cfl=1.5
t-end=1.0
max-timesteps=100000
energy-solver="supg"
energy-substeps=1

## Stokes solver
stokes-krylov-restart=10
stokes-krylov-max-iterations=10
stokes-krylov-relative-tolerance=1e-06
stokes-krylov-absolute-tolerance=1e-12
stokes-viscous-pc-num-vcycles=1
stokes-viscous-pc-cheby-order=2
stokes-viscous-pc-num-smoothing-steps-prepost=3
stokes-viscous-pc-num-power-iterations=10

## I/O (outdir is overridden on the command line by the submit script -> $WORK_pn29po)
outdir="./output_C1_lvl7_cfl15"
outdir-overwrite=1
output-frequency=100
